# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy API app

on:
  push:
    branches:
      - develop
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      PROJECT_FOLDER: "RabbitMqProductAPI"
      PROJECT_NAME: "RabbitMqProductAPI"
      DOTNET_VERSION: "9.x"
      DOTNET_EF_VERSION: "9.0.1"

    steps:
      - uses: actions/checkout@v4

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v4.2.1 # Ex: v4.1.0, See the latest version at https://github.com/marketplace/actions/official-sonarqube-scan
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: Set up .NET Core
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: ${{env.DOTNET_VERSION}}

      - name: Build with dotnet
        working-directory: ${{env.PROJECT_FOLDER}}
        run: dotnet build --configuration Release

      - name: Run tests with dotnet
        run: dotnet test "RabbitMqProductAPI.Tests/RabbitMqProductAPI.Tests.csproj" --configuration Release

      - name: dotnet publish
        working-directory: ${{env.PROJECT_FOLDER}}
        run: dotnet publish -c Release -o myapp

      - name: install dotnet ef
        working-directory: ${{env.PROJECT_FOLDER}}
        run: dotnet tool install -g dotnet-ef --version ${{env.DOTNET_EF_VERSION}}

      - name: dotnet bundle migration
        working-directory: ${{env.PROJECT_FOLDER}}
        run: dotnet ef migrations bundle --runtime linux-x64 -p ${{env.PROJECT_NAME}}.csproj -o myapp/migrate

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: .net-app
          path: ${{env.PROJECT_FOLDER}}/myapp

  snyk:
    strategy:
      matrix:
        configuration: [ Debug, Release ]

    runs-on:
      windows-latest # For a list of available runner types, refer to
    # https://help.github.com/en/actions/reference/workflow-syntax-for-github-actions#jobsjob_idruns-on

    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      # Install the .NET Core workload
      - name: Install .NET Core
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: 9.0.x

      # Add  MSBuild to the PATH: https://github.com/microsoft/setup-msbuild
      - name: Setup MSBuild.exe
        uses: microsoft/setup-msbuild@v1.0.2

      - name: Restore dependencies as well as project-specific tools
        run: dotnet restore

      - name: Install & configure Snyk
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: |
          curl "https://static.snyk.io/cli/latest/snyk-win.exe" -o snyk.exe
          .\snyk auth "$SNYK_TOKEN"

      - name: Run Snyk Open Source (SCA)
        run: |
          .\snyk.exe test

      - name: Create Snyk Open Source (SCA) snapshot
        run: |
          .\snyk.exe monitor
