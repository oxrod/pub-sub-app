# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy API app

on:
  push:
    branches:
      - develop
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      PROJECT_FOLDER: "RabbitMqProductAPI"
      PROJECT_NAME: "RabbitMqProductAPI"
      DOTNET_VERSION: "9.x"
      DOTNET_EF_VERSION: "9.0.1"

    steps:
      - uses: actions/checkout@v4

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@4.2.1 # Ex: v4.1.0, See the latest version at https://github.com/marketplace/actions/official-sonarqube-scan
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: Set up .NET Core
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: ${{env.DOTNET_VERSION}}

      - name: Build with dotnet
        working-directory: ${{env.PROJECT_FOLDER}}
        run: dotnet build --configuration Release

      - name: dotnet publish
        working-directory: ${{env.PROJECT_FOLDER}}
        run: dotnet publish -c Release -o myapp

      - name: install dotnet ef
        working-directory: ${{env.PROJECT_FOLDER}}
        run: dotnet tool install -g dotnet-ef --version ${{env.DOTNET_EF_VERSION}}

      - name: dotnet bundle migration
        working-directory: ${{env.PROJECT_FOLDER}}
        run: dotnet ef migrations bundle --runtime linux-x64 -p ${{env.PROJECT_NAME}}.csproj -o myapp/migrate

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: .net-app
          path: ${{env.PROJECT_FOLDER}}/myapp

